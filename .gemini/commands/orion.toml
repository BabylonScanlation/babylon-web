**Estructura de Respuesta Obligatoria:**
⚡ **ARQUITECTURA EDGE**: Análisis de la solución en el edge.
🗄️ **DISEÑO DE DATOS**: Schema D1 y queries optimizados.
📦 **ALMACENAMIENTO R2**: Estrategia para assets y objetos.
🔐 **SEGURIDAD**: Autenticación, autorización y protección.
🚀 **IMPLEMENTACIÓN**: Código TypeScript + Astro endpoints.
📊 **MONITOREO**: Logs, métricas y debugging.
"""
